<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Słownik Medyczny PL → DE</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #333;
}

.search-box {
    position: relative;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    outline: none;
}

input:focus {
    border-color: #4facfe;
}

#clearBtn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    color: #888;
}

#clearBtn:hover {
    color: #000;
}

.suggestions {
    margin-top: 5px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.suggestion-item {
    padding: 12px;
    background: #f9f9f9;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    font-size: 16px;
}

.suggestion-item:hover {
    background: #e0f7ff;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    background: #f1f1f1;
    min-height: 40px;
    cursor: pointer;
    transition: background 0.3s;
}

.result:active {
    background: #dcdcdc;
}

.footer {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>Słownik medyczny PL → DE 🔊</h1>

    <div class="search-box">
        <input type="text" id="searchInput"
        placeholder="Wpisz słowo po polsku (np. ręka, ból)..."
        oninput="showSuggestions()"
        onkeydown="handleEnter(event)">

        <button id="clearBtn" onclick="clearSearch()">✖</button>
    </div>

    <div id="suggestions" class="suggestions"></div>
    <div id="result" class="result"></div>

    <div class="footer">Kliknij wynik, aby odsłuchać wymowę 🇩🇪</div>
</div>

<script>

const dictionary = {
"ręka": "der Arm",

"usta": "der Mund",
"nos": "die Nase",
"ucho": "das Ohr",
"pupa": "der Po",
"plecy": "der Rücken",
"ząb": "der Zahn",
"palec u nogi": "die Zehe",

"co ci dolega?": "Was fehlt dir?",
"co panu/pani dolega?": "Was fehlt Ihnen?",
"co ci jest?": "Was hast du denn?",
"co mam zrobić?": "Was soll ich tun?",
"co cię boli?": "Was tut dir weh?",
"co pana/panią boli?": "Was tut Ihnen weh?",
"boli mnie głowa": "Der Kopf tut mir weh.",
"bolą mnie nogi": "Die Beine tun mir weh.",
"jak się czujesz?": "Wie fühlst du dich?",
"jak się pan/pani czuje?": "Wie fühlen Sie sich?",
"iść do lekarza": "zum Arzt gehen",
"przychodzić na kontrolę": "zur Kontrolle kommen"
};

function normalizeText(text) {
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

function showSuggestions() {

const input = normalizeText(document.getElementById("searchInput").value);
const suggestionsDiv = document.getElementById("suggestions");
suggestionsDiv.innerHTML = "";

if(input.length === 0) return;

const matches = Object.keys(dictionary).filter(word =>
normalizeText(word).includes(input)
);

matches.forEach(word => {

const div = document.createElement("div");
div.textContent = word;
div.classList.add("suggestion-item");

div.onclick = function() {
selectWord(word);
};

suggestionsDiv.appendChild(div);

});
}

function selectWord(word) {

document.getElementById("searchInput").value = word;
document.getElementById("suggestions").innerHTML = "";

showResult(word);
speak(dictionary[word]);

}

function showResult(word) {

const resultDiv = document.getElementById("result");

resultDiv.textContent = dictionary[word];

resultDiv.onclick = function() {
speak(dictionary[word]);
};

}

function handleEnter(event) {

if(event.key === "Enter") {

const input = normalizeText(document.getElementById("searchInput").value);

const match = Object.keys(dictionary).find(key =>
normalizeText(key) === input
);

if(match) {
selectWord(match);
}

}

}

function speak(text) {

const speech = new SpeechSynthesisUtterance(text);
speech.lang = "de-DE";
speech.rate = 0.9;
speech.pitch = 1;

window.speechSynthesis.cancel();
window.speechSynthesis.speak(speech);

}

function clearSearch() {

document.getElementById("searchInput").value = "";
document.getElementById("suggestions").innerHTML = "";
document.getElementById("result").textContent = "";

window.speechSynthesis.cancel();

}

</script>

</body>
</html>
