<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Słownik PL → DE</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.suggestions {
    margin-top: 5px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.suggestion-item {
    padding: 12px;
    background: #f9f9f9;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    font-size: 16px;
}

.suggestion-item:hover {
    background: #e0f7ff;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    background: #f1f1f1;
    cursor: pointer;
}

.footer {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
<h1>Słownik medyczny PL → DE 🔊</h1>

<input type="text" id="searchInput" placeholder="Wpisz słowo..."
       oninput="showSuggestions()"
       onkeydown="handleEnter(event)">

<div id="suggestions" class="suggestions"></div>
<div id="result" class="result"></div>

<div class="footer">Kliknij wynik aby odsłuchać wymowę 🇩🇪</div>
</div>

<script>

const dictionary = {

"ręka":"der Arm",
"oko":"das Auge",
"brzuch":"der Bauch",
"noga":"das Bein",
"pierś":"die Brust",
"palec":"der Finger",
"stopa":"der Fuß",
"włosy":"das Haar",
"szyja":"der Hals",
"dłoń":"die Hand",
"kolano":"das Knie",
"głowa":"der Kopf",
"ciało":"der Körper",
"usta":"der Mund",
"nos":"die Nase",
"ucho":"das Ohr",
"plecy":"der Rücken",
"ząb":"der Zahn",

"angina":"die Angina",
"gorączka":"das Fieber",
"grypa":"die Grippe",
"kaszel":"der Husten",
"problem ze snem":"die Schlafstörung",
"ból":"der Schmerz",
"ból brzucha":"Bauchschmerzen",
"ból głowy":"Kopfschmerzen",
"ból ucha":"Ohrenschmerzen",
"katar":"der Schnupfen",
"oparzenie słoneczne":"der Sonnenbrand",
"udar słoneczny":"der Sonnenstich",

"oddychać":"atmen",
"leczyć":"behandeln",
"łykać":"schlucken",
"mieć nadzieję":"hoffen",
"kaszleć":"husten",
"wystawiać zwolnienie":"krankschreiben",
"wietrzyć":"lüften",
"badać":"untersuchen",
"zapomnieć":"vergessen",
"zmartwiony":"vermutlich",
"zalecać":"verordnen",
"przepisywać":"verschreiben",
"boleć":"wehtun",

"pilny":"dringend",
"przeziębiony":"erkältet",
"zdrowy":"gesund",
"chory":"krank",
"słaby":"schwach",
"zadowolony":"zufrieden",

"antybiotyk":"das Antibiotikum",
"gabinet lekarski":"die Arztpraxis",
"termin u lekarza":"der Termin beim Arzt",
"obywatel ue":"der EU-Bürger",
"karta ubezpieczenia zdrowotnego":"die Krankenversicherungskarte",
"zwolnienie lekarskie":"die Krankschreibung",
"masaż":"die Massage",
"lek":"das Medikament",
"nagły wypadek":"der Notfall",
"numer alarmowy":"die Notrufnummer",
"recepta":"das Rezept",
"maść":"die Salbe",
"tabletka przeciwbólowa":"die Schmerztablette",
"badanie":"die Untersuchung",
"syrop na kaszel":"der Hustensirup"
};

function showSuggestions() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const suggestionsDiv = document.getElementById("suggestions");
    suggestionsDiv.innerHTML = "";

    if(input.length === 0) return;

    const matches = Object.keys(dictionary).filter(word =>
        word.includes(input)
    );

    matches.forEach(word => {
        const div = document.createElement("div");
        div.textContent = word + " - " + dictionary[word];
        div.classList.add("suggestion-item");

        div.onclick = function() {
            selectWord(word);
        };

        suggestionsDiv.appendChild(div);
    });
}

function selectWord(word) {
    document.getElementById("searchInput").value = word;
    document.getElementById("suggestions").innerHTML = "";
    showResult(word);
    speak(dictionary[word]);
}

function showResult(word) {
    const resultDiv = document.getElementById("result");
    resultDiv.textContent = word + " - " + dictionary[word];

    resultDiv.onclick = function() {
        speak(dictionary[word]);
    };
}

function handleEnter(event) {
    if(event.key === "Enter") {
        const input = document.getElementById("searchInput").value.toLowerCase();
        if(dictionary[input]) {
            selectWord(input);
        }
    }
}

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "de-DE";
    speech.rate = 1;
    speech.pitch = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
